name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build make-me.skill
        run: |
          cd skills/make-me
          zip -r /tmp/make-me.skill . -x "*.DS_Store"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" /tmp/make-me.skill --clobber
